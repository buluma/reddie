<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reddie</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="drag-handle-bar"></div>
  <div class="app-container">
    <header>
      <div class="header-left">
        <h1>Reddie</h1>
        <span id="connection-status" class="connection-status">
          <span class="status-dot"></span>
          <span class="status-text">Connecting…</span>
        </span>
      </div>
      <div class="header-right">
        <input type="text" id="board-search" class="board-search" placeholder="Search…" oninput="filterBoard(this.value)">
        <button class="secondary-btn" onclick="openNewTicket()">New Ticket…</button>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
        <button class="settings-btn" onclick="openSettings()">⚙️</button>
      </div>
    </header>
    <main class="dashboard">
      <div class="column" id="backlog">
        <div class="column-header">
          <h2>Backlog</h2>
          <button class="add-btn" onclick="addTask('backlog')">+</button>
        </div>
        <div class="task-list" id="backlog-list"></div>
      </div>
      <div class="column" id="todo">
        <div class="column-header">
          <h2>To Do</h2>
          <button class="add-btn" onclick="addTask('todo')">+</button>
        </div>
        <div class="task-list" id="todo-list"></div>
      </div>
      <div class="column" id="in-progress">
        <div class="column-header">
          <h2>In Progress</h2>
          <button class="add-btn" onclick="addTask('in-progress')">+</button>
        </div>
        <div class="task-list" id="in-progress-list"></div>
      </div>
      <div class="column" id="done">
        <div class="column-header">
          <h2>Done</h2>
          <button class="add-btn" onclick="addTask('done')">+</button>
        </div>
        <div class="task-list" id="done-list"></div>
      </div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="close-btn" onclick="closeSettings()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Redmine Base URL</label>
          <input type="text" id="redmine-base" placeholder="https://redmine.nasctech.com">
        </div>
        <div class="form-group">
          <label>Redmine API Key</label>
          <input type="password" id="redmine-api-key" placeholder="Your API key">
        </div>
        <div class="form-actions">
          <button onclick="saveSettings()">Save & Reconnect</button>
          <button type="button" class="secondary-btn" onclick="openColumnMapping()">Column Mapping…</button>
          <button type="button" class="secondary-btn" onclick="checkForUpdates()">Check for Updates…</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Column Mapping Modal -->
  <div id="column-mapping-modal" class="modal">
    <div class="modal-content detail-modal-content">
      <div class="modal-header">
        <h2>Column Mapping</h2>
        <button class="close-btn" onclick="closeColumnMapping()">×</button>
      </div>
      <div class="modal-body detail-modal-body" id="column-mapping-body">
        <div class="detail-loading">Loading…</div>
      </div>
      <div class="detail-modal-footer">
        <button id="column-mapping-save-btn" class="comment-submit-btn" style="align-self: stretch;" onclick="saveColumnMappingOverrides()">Save mapping</button>
      </div>
    </div>
  </div>

  <!-- New Ticket Modal -->
  <div id="new-ticket-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>New Ticket</h2>
        <button class="close-btn" onclick="closeNewTicket()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Project</label>
          <select id="new-ticket-project" onchange="loadNewTicketTrackers()"></select>
        </div>
        <div class="form-group">
          <label>Tracker</label>
          <select id="new-ticket-tracker"></select>
        </div>
        <div class="form-group">
          <label>Subject</label>
          <input type="text" id="new-ticket-subject" placeholder="What needs doing?">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="new-ticket-description" rows="4" placeholder="Optional details"></textarea>
        </div>
        <div class="form-actions">
          <button id="new-ticket-submit-btn" onclick="submitNewTicket()">Create</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Issue Detail Modal -->
  <div id="issue-detail-modal" class="modal">
    <div class="modal-content detail-modal-content">
      <div class="modal-header">
        <h2 id="detail-subject">Issue</h2>
        <button class="close-btn" onclick="closeIssueDetail()">×</button>
      </div>
      <div class="modal-body detail-modal-body" id="detail-body">
        <div class="detail-loading">Loading…</div>
      </div>
      <div class="detail-modal-footer">
        <textarea id="comment-input" class="comment-input" placeholder="Add a comment…" rows="3"></textarea>
        <button id="comment-submit-btn" class="comment-submit-btn" onclick="postComment()">Post comment</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="vendor/sortable.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
