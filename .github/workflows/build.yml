name: Build

on:
  # Manual trigger - use this to test a build without cutting a release.
  workflow_dispatch:
  # Real builds happen on version tags (e.g. v1.0.1), not every push -
  # this repo has frequent commits and a full 3-platform matrix build on
  # every one would burn CI minutes for no reason.
  push:
    tags:
      - "v*"

jobs:
  build:
    # Needed for the tag-push path to publish a GitHub Release with
    # GITHUB_TOKEN - manual dispatch runs never publish so this is unused
    # there, but electron-builder needs it whenever it does.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact-path: dist/*.dmg
          - os: windows-latest
            artifact-path: dist/*.exe
          - os: ubuntu-latest
            artifact-path: |
              dist/*.AppImage
              dist/*.deb

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22

      - run: npm ci

      - run: npm run lint

      - run: npm test

      # Electron needs a display for the e2e window to launch; only Linux
      # runners get a virtual one via xvfb-run. macOS/Windows GitHub runners
      # have a real display and run it directly.
      - name: E2E (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test:e2e
      - name: E2E (macOS/Windows)
        if: runner.os != 'Linux'
        run: npm run test:e2e

      - name: Build
        # Tag pushes publish a real GitHub Release (electron-updater checks
        # this - no release means no update feed). Manual dispatch runs
        # stay --publish=never so a test run never mints a release.
        run: npx electron-builder --publish ${{ github.event_name == 'push' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder auto-detects the target from the runner OS -
          # no --mac/--win/--linux flag needed. Unsigned/ad-hoc on every
          # platform: no Apple Developer cert or Windows code-signing
          # cert configured here, so macOS builds are ad-hoc signed (same
          # as local builds) and the Windows exe is unsigned (SmartScreen
          # warning on first run, not a hard block like macOS Gatekeeper).
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: reddie-${{ matrix.os }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 30

  # electron-builder always creates the GitHub Release as a draft when
  # publishing from a matrix build (each OS job appends its own assets to
  # the same draft, so nothing can safely un-draft it mid-matrix). Once
  # every platform has published its assets, flip it live so
  # electron-updater (which ignores drafts) can actually see it.
  publish-release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
